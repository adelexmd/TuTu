server:
  port: 8080

spring:
  application:
    name: tutu-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

tutu:
  deepseek:
    base-url: https://api.deepseek.com
    # API Key 优先取环境变量 DEEPSEEK_API_KEY；未设置时用占位符（启动不报错，调用时才报鉴权错误）
    api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
    model-name: deepseek-chat
  memory:
    # 会话记忆保留的最近消息条数（含系统提示与历史）
    max-messages: 20
